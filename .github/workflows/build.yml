name: Build protosol

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Run deps.sh
        run: bash ./deps.sh

      - name: Check formatting
        run: cargo fmt --check

      - name: Build (release, default — uses pre-generated code)
        run: cargo build --release --locked

      - name: Build (release, solana-types)
        run: cargo build --release --locked -F solana-types

      - name: Clippy
        run: cargo clippy --all-features --locked -- -D warnings

      - name: Verify generated code is up to date
        run: |
          cargo build --features regenerate
          git diff --exit-code src/generated/

  # Verify protosol works as a dependency in solfuzz-agave
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout protosol
        uses: actions/checkout@v4
        with:
          path: protosol
          submodules: recursive

      - name: Checkout solfuzz-agave
        uses: actions/checkout@v4
        with:
          repository: firedancer-io/solfuzz-agave
          ref: agave-v4.0.0-beta.5
          path: solfuzz-agave
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-10-30
          components: clippy, rustfmt

      - name: Build solfuzz-agave deps
        working-directory: solfuzz-agave
        run: bash ./deps.sh

      - name: Patch solfuzz-agave to use local protosol
        working-directory: solfuzz-agave
        run: |
          cat >> Cargo.toml <<'EOF'

          [patch."https://github.com/firedancer-io/protosol"]
          protosol = { path = "../protosol" }
          EOF

      - name: Build solfuzz-agave with local protosol
        working-directory: solfuzz-agave
        run: cargo check
