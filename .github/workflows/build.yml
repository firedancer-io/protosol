name: Build protosol

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Run deps.sh
        run: bash ./deps.sh

      - name: Check formatting
        run: cargo fmt --check

      - name: Build (release, default — uses pre-generated code)
        run: cargo build --release --locked

      - name: Build (release, solana-types)
        run: cargo build --release --locked -F solana-types

      - name: Clippy
        run: cargo clippy --all-features --locked -- -D warnings

      - name: Verify generated code is up to date
        run: |
          cargo build --features regenerate
          git diff --exit-code src/generated/
